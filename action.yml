name: Lighthouse Insights Action
description: Run Lighthouse CI audits and generate human-friendly Markdown reports
author: lighthouse-insights-action

branding:
  icon: activity
  color: green

inputs:
  urls:
    description: Newline-separated list of full URLs to audit (highest priority when set)
    required: false
  paths:
    description: Newline or comma-separated URL paths (e.g. /,/about). Used with domain inputs when urls is empty
    required: false
  production-domain:
    description: Production origin (e.g. https://www.example.com). With staging-domain + paths, both domains are audited
    required: false
  staging-domain:
    description: Staging/preview origin (e.g. https://staging.example.com). With production-domain + paths, both domains are audited
    required: false
  default-domain:
    description: Default origin used with paths when production-domain and staging-domain are not both set
    required: false
  config-path:
    description: Path to a Lighthouse CI configuration file (advanced mode; takes precedence over urls/paths)
    required: false
  results-path:
    description: Directory containing Lighthouse CI results
    required: false
    default: .lighthouseci
  production-report:
    description: Path to the production baseline Markdown report used for PR comparisons
    required: false
    default: prod-lighthouse-report.md
  upload-summary:
    description: Whether to publish the report to the GitHub Step Summary
    required: false
    default: 'true'
  upload-report:
    description: Whether to upload the Markdown report as a workflow artifact
    required: false
    default: 'true'
  upload-raw-results:
    description: Whether to upload the raw Lighthouse CI results directory as an artifact
    required: false
    default: 'false'
  report-artifact-name:
    description: Artifact name for the Markdown report
    required: false
    default: lighthouse-report
  raw-results-artifact-name:
    description: Artifact name for the raw Lighthouse CI results
    required: false
    default: lighthouse-results
  important-paths:
    description: Comma-separated URL paths to highlight with a star prefix
    required: false
    default: /,/consulting/net-upgrade,/consulting/web-applications

outputs:
  report:
    description: Generated Markdown report content
    value: ${{ steps.run.outputs.report }}
  report-path:
    description: Path to the written Markdown report file
    value: ${{ steps.run.outputs.report-path }}
  results-path:
    description: Path to the Lighthouse CI results directory
    value: ${{ steps.run.outputs.results-path }}
  report-artifact-name:
    description: Name of the uploaded Markdown report artifact (empty if not uploaded)
    value: ${{ steps.run.outputs.report-artifact-name }}
  raw-results-artifact-name:
    description: Name of the uploaded raw results artifact (empty if not uploaded)
    value: ${{ steps.run.outputs.raw-results-artifact-name }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev --ignore-scripts

    - name: Run Lighthouse Insights Action
      id: run
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        INPUT_URLS: ${{ inputs.urls }}
        INPUT_PATHS: ${{ inputs.paths }}
        "INPUT_PRODUCTION-DOMAIN": ${{ inputs.production-domain }}
        "INPUT_STAGING-DOMAIN": ${{ inputs.staging-domain }}
        "INPUT_DEFAULT-DOMAIN": ${{ inputs.default-domain }}
        "INPUT_CONFIG-PATH": ${{ inputs.config-path }}
        "INPUT_RESULTS-PATH": ${{ inputs.results-path }}
        "INPUT_PRODUCTION-REPORT": ${{ inputs.production-report }}
        "INPUT_UPLOAD-SUMMARY": ${{ inputs.upload-summary }}
        "INPUT_UPLOAD-REPORT": ${{ inputs.upload-report }}
        "INPUT_UPLOAD-RAW-RESULTS": ${{ inputs.upload-raw-results }}
        "INPUT_REPORT-ARTIFACT-NAME": ${{ inputs.report-artifact-name }}
        "INPUT_RAW-RESULTS-ARTIFACT-NAME": ${{ inputs.raw-results-artifact-name }}
        "INPUT_IMPORTANT-PATHS": ${{ inputs.important-paths }}
      run: node "${{ github.action_path }}/dist/index.js"

    # Composite run: steps do not receive ACTIONS_RUNTIME_TOKEN, so upload via the official action.
    - name: Upload Markdown report artifact
      if: ${{ inputs.upload-report == 'true' && steps.run.outputs.report-path != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.report-artifact-name }}
        path: ${{ steps.run.outputs.report-path }}
        if-no-files-found: warn

    - name: Upload raw Lighthouse results artifact
      if: ${{ inputs.upload-raw-results == 'true' && steps.run.outputs.results-path != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.raw-results-artifact-name }}
        path: ${{ steps.run.outputs.results-path }}
        if-no-files-found: warn
