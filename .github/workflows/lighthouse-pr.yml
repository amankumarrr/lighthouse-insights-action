name: Lighthouse PR Report

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: lighthouse-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Audit aman-kumar.dev and comment on PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Lighthouse against https://aman-kumar.dev
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run local:live

      - name: Publish report to job summary
        if: always() && hashFiles('prod-lighthouse-report.md') != ''
        run: |
          {
            echo "## Lighthouse report — https://aman-kumar.dev"
            echo
            cat prod-lighthouse-report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment report on PR
        if: hashFiles('prod-lighthouse-report.md') != ''
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('prod-lighthouse-report.md', 'utf8').trim();
            const marker = '<!-- lighthouse-insights-action:aman-kumar.dev -->';
            const body = [
              marker,
              '## Lighthouse report — https://aman-kumar.dev',
              '',
              report,
              '',
              `_Generated by workflow run [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing PR comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created new PR comment');
            }
